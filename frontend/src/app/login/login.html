<div class="login-page">
  <div class="login-card">
    <h1><span class="brand-icon">✦</span> KPOP STORE</h1>
    <p class="login-subtitle">Tu tienda de K-pop y anime favorita</p>

    <div class="tabs">
      <button [class.active]="modo === 'login'" (click)="modo = 'login'; error = ''">Iniciar sesión</button>
      <button [class.active]="modo === 'registro'" (click)="modo = 'registro'; error = ''">Registrarse</button>
    </div>

    <div *ngIf="error" class="error-msg">{{ error }}</div>

    <div *ngIf="modo === 'login'" class="form-group">
      <input type="email" placeholder="Email" [(ngModel)]="email" />
      <input type="password" placeholder="Contraseña" [(ngModel)]="password" />
      <button class="btn-primary" (click)="login()">Entrar</button>
    </div>

    <div *ngIf="modo === 'registro'" class="form-group">
      <input type="text" placeholder="Nombre" [(ngModel)]="nombre" />
      <input type="email" placeholder="Email" [(ngModel)]="email" />
      <input type="password" placeholder="Contraseña" [(ngModel)]="password" />
      <button class="btn-primary" (click)="registro()">Crear cuenta</button>
    </div>
  </div>
</div>
